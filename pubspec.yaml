name: amarRailSheba
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  google_maps_flutter: ^2.10.0
  location: ^7.0.1
  email_validator: ^2.0.1
  url_launcher: ^6.0.20
  logger: ^2.5.0
  qr_flutter: ^4.1.0
  http: ^1.2.0
  fluttertoast: ^8.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  flutter_polyline_points: ^2.1.0
  geolocator: ^13.0.2
  intl: ^0.19.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_database: ^12.3.0
  firebase_crashlytics: ^4.1.0
  firebase_analytics: ^11.3.0
  firebase_messaging: ^15.1.0

  



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/trainBackgrong/

# ── App Icon config ───────────────────────────────────────────────────────────
# 1. Place your icon at assets/icon/app_icon.png (1024×1024, no transparency)
# 2. Run: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    
